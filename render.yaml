services:
  - type: web
    name: cheertribe-2026
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: NIM_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
